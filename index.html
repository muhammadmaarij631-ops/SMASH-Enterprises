    <script>
      // Silence benign iframe/proxy WebSocket and HMR connection errors completely
      (function() {
        function isBenignError(msg) {
          if (!msg) return false;
          var lower = String(msg).toLowerCase();
          return lower.indexOf('websocket') !== -1 || 
                 lower.indexOf('ws://') !== -1 || 
                 lower.indexOf('wss://') !== -1 ||
                 lower.indexOf('[vite] failed') !== -1 ||
                 lower.indexOf('web-socket') !== -1;
        }

        // Overwrite window.onerror
        var oldOnError = window.onerror;
        window.onerror = function(message, source, lineno, colno, error) {
          var msg = message || '';
          if (error && error.message) msg = error.message;
          if (isBenignError(msg)) {
            return true; // prevents firing default browser/platform handler
          }
          if (oldOnError) {
            return oldOnError.apply(this, arguments);
          }
          return false;
        };

        // Event listener for uncaught errors in the capture phase (intercepts early)
        window.addEventListener('error', function(event) {
          var msg = event.message || (event.error && event.error.message) || '';
          if (isBenignError(msg)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        // Event listener for unhandled promise rejections in the capture phase
        window.addEventListener('unhandledrejection', function(event) {
          var reason = event.reason;
          var msg = '';
          if (reason) {
            msg = reason.message || reason.stack || String(reason);
          }
          if (isBenignError(msg)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        // Overwrite console.error to silence the output in console/devtools/overlays
        var originalConsoleError = console.error;
        console.error = function() {
          var args = Array.prototype.slice.call(arguments);
          var firstArg = args[0];
          if (firstArg && isBenignError(String(firstArg))) {
            return;
          }
          originalConsoleError.apply(console, args);
        };
        
        // Overwrite console.warn to silence the warning output as well
        var originalConsoleWarn = console.warn;
        console.warn = function() {
          var args = Array.prototype.slice.call(arguments);
          var firstArg = args[0];
          if (firstArg && isBenignError(String(firstArg))) {
            return;
          }
          originalConsoleWarn.apply(console, args);
        };
      })();
    </script>
